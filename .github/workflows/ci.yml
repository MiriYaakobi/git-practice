name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repository structure
        run: ls -la

      - name: Verify README exists
        run: |
          echo "Running CI on commit $GITHUB_SHA"
          test -f README.md && echo "README found" || (echo "README missing" && exit 1)